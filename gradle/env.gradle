def hasEnvironment() {
    return hasProperty( 'env' )
}

def isProd() {
    return hasEnvironment() ? env in ['p', 'prod', 'production'] : true
}

def getEnvironmentShort() {
    return isProd() ? 'prod' : 'dev'
}

ext {
    hasEnvironment = { hasEnvironment() }
    environmentShort = { getEnvironmentShort() }
    isProd = { isProd() }
}
